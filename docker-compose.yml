services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: skintel_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: skintel_admin
      MONGO_INITDB_ROOT_PASSWORD: skintel123
      MONGO_INITDB_DATABASE: skintel_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - skintel_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: skintel_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - skintel_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # MinIO Bucket Setup
  minio-setup:
    image: minio/mc:latest
    container_name: skintel_minio_setup
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - skintel_network
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set skintel http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb skintel/skintel-images --ignore-existing;
      /usr/bin/mc mb skintel/processed-images --ignore-existing;
      /usr/bin/mc mb skintel/skintel-models --ignore-existing;
      /usr/bin/mc anonymous set download skintel/skintel-images;
      /usr/bin/mc anonymous set download skintel/processed-images;
      echo 'MinIO buckets created successfully';
      exit 0;
      "

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skintel_backend
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ./modules:/app/modules
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
      - ./main.py:/app/main.py
      - ./.env:/app/.env
    depends_on:
      mongodb:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - skintel_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  skintel_network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  minio_data:
    driver: local